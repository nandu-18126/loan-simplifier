services:
  - type: web
    name: loan-simplifier
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0